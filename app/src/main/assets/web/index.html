<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#1A1B26" />
    <!-- Enables fullscreen standalone mode when added to the home screen (esp. iOS). -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Codenames</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- Landing: pick team + role (skipped when ?role=host) -->
    <section id="landing" class="landing hidden">
        <h1>Codenames</h1>
        <p class="subtitle">Escolha seu time e sua função</p>

        <div class="group">
            <span class="group-label">Time</span>
            <div class="options">
                <button class="opt team-red" data-group="team" data-value="RED">Vermelho</button>
                <button class="opt team-blue" data-group="team" data-value="BLUE">Azul</button>
            </div>
        </div>

        <div class="group">
            <span class="group-label">Função</span>
            <div class="options">
                <button class="opt" data-group="role" data-value="SPYMASTER" disabled>Espião Mestre</button>
                <button class="opt" data-group="role" data-value="AGENT" disabled>Agente</button>
            </div>
        </div>

        <button id="enter" class="enter" disabled>Entrar</button>
        <p class="hint">O Espião Mestre vê o mapa de cores. O Agente vê apenas as palavras.</p>
    </section>

    <!-- Game board -->
    <section id="game" class="game hidden">
        <header id="topbar">
            <button id="backBtn" class="ctrl hidden" type="button" title="Voltar" aria-label="Voltar">
                <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </button>
            <div id="banner" class="banner"></div>
            <span class="count red"><span id="redCount">0</span></span>
            <span class="count blue"><span id="blueCount">0</span></span>
            <span class="spacer"></span>
            <div id="hostControls" class="host-controls hidden">
                <button id="passTurn" class="ctrl" type="button" title="Passar turno" aria-label="Passar turno">
                    <svg viewBox="0 0 24 24"><polyline points="13 17 18 12 13 7"></polyline><polyline points="6 17 11 12 6 7"></polyline></svg>
                </button>
                <button id="newGame" class="ctrl" type="button" title="Nova partida" aria-label="Nova partida">
                    <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                </button>
            </div>
        </header>

        <div id="board" class="board"></div>
    </section>

    <!-- Floating fullscreen toggle (browser players only) -->
    <button id="fsBtn" class="fs-btn" type="button" title="Tela cheia" aria-label="Tela cheia">⛶</button>

    <script src="nosleep.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
